<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Uoogle — Sign in</title>
    <link rel="icon" href="uoogle_paw.png" />
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <nav class="topbar" aria-label="Site">
      <a href="index.html" class="toplink home" aria-label="Home">🏠</a>
      <div class="spacer"></div>
      <a href="umail.html" class="toplink"><img src="umail.png" alt="" />Umail</a>
      <a href="images-index.html" class="toplink">Images</a>
      <a href="utube.html" class="toplink"><img src="dogtube.png" alt="" />UTube</a>
      <a href="uoogle-signin.html" class="top-signin">Sign in</a>
    </nav>

    <main style="display:grid; place-items:center; min-height:70vh; padding:1rem;">
      <div style="width:min(420px,95vw); border:1px solid #dadce0; border-radius:12px; padding:1.25rem; background:#fff; text-align:center;">
        <div style="display:flex; align-items:center; justify-content:center; gap:.5rem; margin-bottom:.75rem;">
          <img src="uoogle_paw.png" alt="" style="width:32px; height:32px;" />
          <h1 style="margin:0; font-size:1.25rem;">Sign in to Uoogle</h1>
        </div>
        <p style="color:#5f6368; margin:.5rem 0 1rem;">Tap your dog's NFC chip to continue.</p>
        <div style="display:flex; gap:.5rem; justify-content:center;">
          <button class="primary" type="button">Try again</button>
          <a href="uoogle-signup.html" class="toplink" style="align-self:center;">Sign up</a>
        </div>
        <p style="color:#5f6368; font-size:.9rem; margin-top:.8rem;">This is a demo and does not authenticate.</p>
      </div>
    </main>

    <footer class="footer">
      <span>Uoogle sign in is a demo.</span>
    </footer>
