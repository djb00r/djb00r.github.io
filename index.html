<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Autumn Websim Archives</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f57c00; /* orange background */
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
    }

    a {
      display: block;
      padding: 12px;
      background: #ffe0b2;
      text-align: center;
      text-decoration: none;
      color: black;
      border-radius: 5px;
      transition: 0.2s;
      font-weight: bold;
    }

    a:hover {
      background: #ffcc80;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Autumn Websim Archives</h1>

    <div class="grid">
      <a href="alphabet/">alphabet</a>
      <a href="baldi/">baldi</a>
      <a href="barney/">barney</a>
      <a href="caillou/">caillou</a>
      <a href="controlgame/">controlgame</a>
      <a href="corrupter/">corrupter</a>
      <a href="endings/">endings</a>

      <a href="googleplay/">googleplay</a>
      <a href="icecream/">icecream</a>
      <a href="letters/">letters</a>
      <a href="numbers/">numbers</a>
      <a href="orangeland/">orangeland</a>
      <a href="pawn/">pawn</a>

      <a href="peppapig/">peppapig</a>
      <a href="phone/">phone</a>
      <a href="pizza/">pizza</a>
      <a href="status/">status</a>
      <a href="temu/">temu</a>
      <a href="toysrus/">toysrus</a>

      <a href="toysrusplus/">toysrusplus</a>
      <a href="turkeysam/">turkeysam</a>
      <a href="windows/">windows</a>
      <a href="ytp/">ytp</a>
      <a href="zoom/">zoom</a>
    </div>
  </div>

</body>
</html>
