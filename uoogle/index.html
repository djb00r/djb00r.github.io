<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>uoogle — google for dogs</title>
    <link rel="icon" href="uoogle_paw.png" />
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Import map for ESM libraries -->
    <script type="importmap">
      {
        "imports": {
          "fuse.js": "https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.esm.js"
        }
      }
    </script>
    <style>
      /* Feeling Woofy animation helpers */
      .logo {
        position: relative;
      }
      .logo .dog,
      .logo .wordmark {
        transition: transform 0.5s ease, opacity 0.4s ease;
      }
      #woofyOverlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1200;
        overflow: hidden;
      }
      .woofy-floating {
        position: absolute;
        font-weight: 700;
        pointer-events: none;
      }

      /* 1. Swap & spin dog and logo */
      @keyframes woofy-swap-spin-dog {
        0% { transform: translateX(0) rotate(0deg); }
        50% { transform: translateX(120px) rotate(360deg); }
        100% { transform: translateX(0) rotate(720deg); }
      }
      @keyframes woofy-swap-spin-logo {
        0% { transform: translateX(0) rotate(0deg); }
        50% { transform: translateX(-120px) rotate(-360deg); }
        100% { transform: translateX(0) rotate(-720deg); }
      }
      .woofy-swap-dog { animation: woofy-swap-spin-dog 1.5s ease-in-out; }
      .woofy-swap-logo { animation: woofy-swap-spin-logo 1.5s ease-in-out; }

      /* 2. Bone throw & dog run */
      @keyframes woofy-bone-fly {
        0% { transform: translate(-40px, 40px) rotate(0deg); opacity: 0; }
        20% { opacity: 1; }
        60% { transform: translate(80px, -40px) rotate(360deg); opacity: 1; }
        100% { transform: translate(140px, -60px) rotate(540deg); opacity: 0; }
      }
      @keyframes woofy-dog-run {
        0% { transform: translateX(0); }
        50% { transform: translateX(60px); }
        100% { transform: translateX(0); }
      }
      @keyframes woofy-logo-hit {
        0%,100% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        75% { transform: translateX(6px); }
      }
      .woofy-dog-run { animation: woofy-dog-run 1.2s ease-in-out; }
      .woofy-logo-hit { animation: woofy-logo-hit 0.4s ease-in-out 0.8s; }
      .woofy-bone { animation: woofy-bone-fly 1.2s ease-out; font-size: 2rem; }

      /* 3. Bark spin */
      @keyframes woofy-dog-spin {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(360deg) scale(1.1); }
        100% { transform: rotate(720deg) scale(1); }
      }
      @keyframes woofy-bark-text {
        0% { opacity: 0; transform: translate(0, 0) scale(0.6); }
        20% { opacity: 1; }
        100% { opacity: 0; transform: translate(0, -80px) scale(1.2); }
      }
      .woofy-dog-spin { animation: woofy-dog-spin 1.2s ease-in-out; }
      .woofy-bark { animation: woofy-bark-text 1s ease-out; font-size: 1.4rem; color:#ff6f00; }

      /* 4. Logo fall & explode, dog confused */
      @keyframes woofy-logo-fall {
        0% { transform: translateY(0) scale(1); }
        80% { transform: translateY(120px) scale(1.05); }
        100% { transform: translateY(140px) scale(0.2); opacity: 0; }
      }
      @keyframes woofy-explosion {
        0% { transform: scale(0.2); opacity: 0; }
        30% { opacity: 1; }
        100% { transform: scale(2.2); opacity: 0; }
      }
      @keyframes woofy-confused {
        0%,100% { transform: translateY(0) rotate(0deg); }
        25% { transform: translateY(-6px) rotate(-5deg); }
        75% { transform: translateY(-6px) rotate(5deg); }
      }
      .woofy-logo-fall { animation: woofy-logo-fall 0.9s ease-in forwards; }
      .woofy-confused { animation: woofy-confused 0.8s ease-in-out 0.4s; }
      .woofy-explosion-burst {
        animation: woofy-explosion 0.7s ease-out 0.8s;
        width: 80px; height: 80px;
        border-radius: 50%;
        background: radial-gradient(circle, #ff9800 0, #ff5722 40%, transparent 70%);
      }

      /* 5. Police dog chase */
      @keyframes woofy-police-approach {
        0% { transform: translateX(-40px); opacity: 0; }
        20% { opacity: 1; }
        50% { transform: translateX(0); opacity: 1; }
        100% { transform: translateX(40px); opacity: 0; }
      }
      @keyframes woofy-dog-run-away {
        0% { transform: translateX(0); }
        40% { transform: translateX(60px); opacity: 1; }
        100% { transform: translateX(120px); opacity: 0; }
      }
      @keyframes woofy-dog-return {
        0% { transform: translateX(-120px); opacity: 0; }
        40% { opacity: 1; }
        100% { transform: translateX(0); opacity: 1; }
      }
      .woofy-police-dog {
        width: 64px; height: 64px;
        position:absolute;
        bottom:-10px; left:10px;
        animation: woofy-police-approach 1.4s ease-in-out;
      }
      .woofy-dog-run-away { animation: woofy-dog-run-away 1.2s ease-in forwards; }
      .woofy-dog-return { animation: woofy-dog-return 1.2s ease-out 1.2s forwards; }

      /* 6. Invert mode */
      .woofy-invert-site {
        filter: invert(1) hue-rotate(180deg);
      }
      @keyframes woofy-alert {
        0%,100% { transform: translateY(0); opacity: 0; }
        20% { opacity: 1; }
        50% { transform: translateY(-10px); opacity: 1; }
      }
      .woofy-alert-mark {
        animation: woofy-alert 1.2s ease-out;
        font-size: 2rem;
        color:#ff1744;
      }

      /* 7. Lamp stomp on logo */
      @keyframes woofy-lamp-drop {
        0% { transform: translateY(-160px) scale(0.8); opacity: 0; }
        40% { opacity: 1; }
        70% { transform: translateY(-10px) scale(1); }
        100% { transform: translateY(0) scale(0.9); }
      }
      @keyframes woofy-logo-squash {
        0%,100% { transform: scale(1); }
        40% { transform: scale(0.7,0.4) translateY(10px); }
      }
      @keyframes woofy-lamp-to-dog {
        0% { transform: translate(0,0) scale(1); }
        100% { transform: translate(-80px,20px) scale(0); opacity:0; }
      }
      .woofy-lamp {
        width: 40px; height: 80px;
        border-radius: 16px 16px 6px 6px;
        background: linear-gradient(#ffc107,#ff9800);
        box-shadow: 0 6px 12px rgba(0,0,0,.25);
        animation: woofy-lamp-drop 0.8s ease-out;
      }
      .woofy-lamp-eat { animation: woofy-lamp-to-dog 0.8s ease-in forwards; }
      .woofy-logo-squash { animation: woofy-logo-squash 1s ease-in-out; }

      /* 8. Whole site falls, truck runs over, dogs fix it */
      @keyframes woofy-site-shake {
        0%,100% { transform: translate(0,0) rotate(0deg); }
        20% { transform: translate(-4px,2px) rotate(-1deg); }
        40% { transform: translate(4px,-2px) rotate(1deg); }
        60% { transform: translate(-3px,1px) rotate(-1deg); }
        80% { transform: translate(3px,-1px) rotate(1deg); }
      }
      @keyframes woofy-site-fall {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(140px); opacity: 0.4; }
      }
      .woofy-site-collapse body > *:not(#woofyOverlay):not(#dogLayer) {
        animation: woofy-site-shake 0.5s ease-in-out, woofy-site-fall 0.9s ease-in forwards;
        transform-origin: center top;
      }

      @keyframes woofy-truck-drive {
        0% { transform: translateX(-160px); }
        100% { transform: translateX(120vw); }
      }
      .woofy-truck {
        position: fixed;
        bottom: 12px;
        left: 0;
        width: 130px;
        height: 60px;
        border-radius: 10px;
        background: linear-gradient(90deg,#455a64,#607d8b);
        box-shadow: 0 6px 16px rgba(0,0,0,.35);
        animation: woofy-truck-drive 1.4s ease-out 0.3s forwards;
        z-index: 1300;
        overflow: visible;
      }
      .woofy-truck::before,
      .woofy-truck::after {
        content: "";
        position: absolute;
        bottom: -16px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #212121;
        box-shadow: 0 0 0 4px #424242 inset;
      }
      .woofy-truck::before { left: 18px; }
      .woofy-truck::after { right: 18px; }

      @keyframes woofy-dog-fix {
        0% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-18px) scale(1.05); }
        100% { transform: translateY(0) scale(1); }
      }
      .woofy-fix-dog {
        position: fixed;
        bottom: 0;
        width: 54px;
        height: 54px;
        animation: woofy-dog-fix 0.9s ease-in-out 1.1s infinite alternate;
        z-index: 1301;
      }
    </style>
  </head>
  <body>
    <nav class="topbar" aria-label="Site">
      <a href="index.html" class="toplink home" aria-label="Home">🏠</a>
      <div class="spacer"></div>
      <a href="umail.html" class="toplink"><img src="umail.png" alt="" />Umail</a>
      <a href="images-index.html" class="toplink">Images</a>
      <a href="utube.html" class="toplink"><img src="dogtube.png" alt="" />UTube</a>
      <a href="woofme.html" class="toplink"><img src="/Google_Chrome_icon_(February_2022).png" alt="" style="width:16px;height:16px;margin-right:6px;filter:none;" />Woofme</a>
      <a href="uoogle-signin.html" class="top-signin">Sign in</a>
    </nav>
    <header class="hero">
      <div class="logo">
        <img class="dog" id="mainDogLogo" src="dog.png" alt="mascot" />
        <img class="wordmark" src="/googlelogo_color_272x92dp2.png" alt="googlecolor" />
        <span class="tagline">google for dogs</span>
      </div>

      <form id="searchForm" class="search-bar" autocomplete="off" role="search" aria-label="Dog search form" action="results.html" method="get">
        <input id="searchInput" name="q" type="search" placeholder="Search breeds, tricks, treats, parks..." aria-label="Search" />
        <div class="actions">
          <button type="button" id="micBtn" class="ghost" aria-label="Voice search">🎙️</button>
          <button type="submit" class="primary">
            <img src="bone_icon.png" alt="" /> Search
          </button>
          <button type="button" id="feelingWoofy" class="secondary">I'm Feeling Woof-y</button>
        </div>
        <ul id="suggestions" class="suggestions" role="listbox" aria-label="Suggestions"></ul>
      </form>

      <nav class="chips" aria-label="Quick filters">
        <button class="chip" data-chip="puppy">puppy</button>
        <button class="chip" data-chip="training">training</button>
        <button class="chip" data-chip="treats">treats</button>
        <button class="chip" data-chip="parks">parks</button>
        <button class="chip" data-chip="grooming">grooming</button>
        <button class="chip" data-chip="toys">toys</button>
      </nav>
    </header>

    <main>
      <section class="results">
        <div class="column">
          <h2 class="section-title">Dog Images</h2>
          <div id="imageGrid" class="grid" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <dialog id="lightbox">
      <button id="closeLightbox" class="close" aria-label="Close">✕</button>
      <img id="lightboxImg" alt="Dog image" />
      <div class="lightbox-actions">
        <a id="openImg" class="secondary" target="_blank" rel="noopener">Open</a>
        <button id="copyImg" class="primary">Copy Image URL</button>
        <button id="anotherLikeThis" class="ghost">Fetch another</button>
      </div>
    </dialog>

    <footer class="footer">
      <span>Built for fun. Images courtesy of Dog CEO API. Articles via Wikipedia.</span>
      <!-- Optional: show provided assets in an easter-egg area -->
      <details>
        <summary>Credits & extras</summary>
        <div class="extras">
          <img src="/googlelogo_color_272x92dp2.png" alt="pixelated logo asset (user-provided)" />
          <img src="/dog.png" alt="cartoon person asset (user-provided)" />
        </div>
      </details>
    </footer>

    <script type="module" src="app.js"></script>
    <div id="dogLayer" aria-hidden="true"></div>
    <div id="woofyOverlay" aria-hidden="true"></div>
    
    <script>
      (function () {
        const btn = document.getElementById('feelingWoofy');
        const dog = document.getElementById('mainDogLogo');
        const logo = document.querySelector('.logo .wordmark');
        const overlay = document.getElementById('woofyOverlay');
        const root = document.documentElement;

        function clearOverlay() {
          overlay.innerHTML = '';
          dog.className = dog.className.replace(/\bwoofy-\S+/g, '').trim();
          logo.className = logo.className.replace(/\bwoofy-\S+/g, '').trim();
          document.body.classList.remove('woofy-invert-site');
          document.documentElement.classList.remove('woofy-site-collapse');
        }

        function centerFor(el) {
          const rect = el.getBoundingClientRect();
          return {
            x: rect.left + rect.width / 2,
            y: rect.top + rect.height / 2
          };
        }

        function createFloating(content, x, y, extraClass) {
          const span = document.createElement('div');
          span.className = 'woofy-floating ' + (extraClass || '');
          span.textContent = content;
          span.style.left = x + 'px';
          span.style.top = y + 'px';
          overlay.appendChild(span);
          return span;
        }

        function anim1_swapSpin() {
          // uoogle text and dog spin & swap places then reset
          dog.classList.add('woofy-swap-dog');
          logo.classList.add('woofy-swap-logo');
          setTimeout(clearOverlay, 1700);
        }

        function anim2_boneThrow() {
          // bone emoji flies, dog runs to it, then hits logo
          const centerDog = centerFor(dog);
          const bone = createFloating('🦴', centerDog.x, centerDog.y, 'woofy-bone');
          dog.classList.add('woofy-dog-run');
          logo.classList.add('woofy-logo-hit');
          setTimeout(clearOverlay, 1600);
        }

        function anim3_barkSpin() {
          // dog spins and BARK text comes out
          const c = centerFor(dog);
          const bark = createFloating('BARK', c.x + 40, c.y - 20, 'woofy-bark');
          dog.classList.add('woofy-dog-spin');
          setTimeout(() => {
            if (bark.parentNode) bark.parentNode.removeChild(bark);
          }, 1100);
          setTimeout(clearOverlay, 1500);
        }

        function anim4_logoExplodeConfused() {
          // logo falls, explodes, dog confused with orange ? before reset
          logo.classList.add('woofy-logo-fall');
          const logoCenter = centerFor(logo);
          const burst = document.createElement('div');
          burst.className = 'woofy-floating woofy-explosion-burst';
          burst.style.left = (logoCenter.x - 40) + 'px';
          burst.style.top = (logoCenter.y + 40) + 'px';
          overlay.appendChild(burst);

          const dogCenter = centerFor(dog);
          const q = createFloating('?', dogCenter.x + 10, dogCenter.y - 70, '');
          q.style.color = '#ff9800';
          q.style.fontSize = '2rem';
          dog.classList.add('woofy-confused');

          setTimeout(() => {
            clearOverlay();
          }, 1800);
        }

        function anim5_policeChase() {
          // police dog appears behind, dog runs away & returns
          const rect = dog.getBoundingClientRect();
          const police = document.createElement('img');
          police.src = 'blue_dog.png';
          police.alt = 'Police dog';
          police.className = 'woofy-police-dog';
          police.style.left = (rect.left - 10) + 'px';
          police.style.top = (rect.top + rect.height - 60) + 'px';
          overlay.appendChild(police);

          dog.classList.add('woofy-dog-run-away');
          // bring dog back as "police dog" briefly by tinting
          setTimeout(() => {
            dog.classList.remove('woofy-dog-run-away');
            dog.classList.add('woofy-dog-return');
          }, 1200);

          setTimeout(clearOverlay, 2600);
        }

        function anim6_invertSite() {
          // invert uoogle text & whole site, dog has !
          document.body.classList.add('woofy-invert-site');
          const c = centerFor(dog);
          const mark = createFloating('!', c.x + 5, c.y - 70, 'woofy-alert-mark');
          setTimeout(() => {
            if (mark.parentNode) mark.parentNode.removeChild(mark);
            document.body.classList.remove('woofy-invert-site');
          }, 1300);
          setTimeout(clearOverlay, 1500);
        }

        function anim7_lampStomp() {
          // lamp drops on logo like Pixar, dog eats lamp and logo is fixed
          const logoRect = logo.getBoundingClientRect();
          const dogRect = dog.getBoundingClientRect();
          const lamp = document.createElement('div');
          lamp.className = 'woofy-floating woofy-lamp';
          lamp.style.left = (logoRect.left + logoRect.width - 40) + 'px';
          lamp.style.top = (logoRect.top - 80) + 'px';
          overlay.appendChild(lamp);
          logo.classList.add('woofy-logo-squash');

          setTimeout(() => {
            // move lamp towards dog as if eaten
            lamp.classList.add('woofy-lamp-eat');
          }, 900);

          setTimeout(clearOverlay, 1900);
        }

        function anim8_siteTruckFix() {
          // whole site collapses, truck drives through, then a bunch of dogs bounce in to fix it
          document.documentElement.classList.add('woofy-site-collapse');

          // add truck
          const truck = document.createElement('div');
          truck.className = 'woofy-truck';
          overlay.appendChild(truck);

          // add multiple fixing dogs
          const count = 6;
          for (let i = 0; i < count; i++) {
            const fixDog = document.createElement('img');
            fixDog.src = 'dog.png';
            fixDog.alt = 'Fixing dog';
            fixDog.className = 'woofy-fix-dog';
            const left = 10 + (window.innerWidth - 80) * Math.random();
            fixDog.style.left = left + 'px';
            overlay.appendChild(fixDog);
          }

          setTimeout(clearOverlay, 2600);
        }

        function runRandomWoofy() {
          clearOverlay();
          const animations = [
            anim1_swapSpin,
            anim2_boneThrow,
            anim3_barkSpin,
            anim4_logoExplodeConfused,
            anim5_policeChase,
            anim6_invertSite,
            anim7_lampStomp,
            anim8_siteTruckFix
          ];
          const choice = animations[Math.floor(Math.random() * animations.length)];
          choice();
        }

        if (btn) {
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            runRandomWoofy();
          });
        }
      })();
    </script>
  </body>
</html>
